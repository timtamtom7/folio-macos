name: FOLIO
options:
  bundleIdPrefix: com.folio
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift
    from: "0.14.0"
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher
    from: "7.0.0"
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup
    from: "2.6.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.2.0"

targets:
  FOLIO:
    type: application
    platform: macOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.folio.app
        PRODUCT_NAME: FOLIO
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Sources/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: NO
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - package: SQLite
      - package: Kingfisher
      - package: SwiftSoup
      - package: KeychainAccess
    entitlements:
      path: Sources/Resources/FOLIO.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.network.client: true
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.folio.app
